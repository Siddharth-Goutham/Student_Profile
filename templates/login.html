<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Access - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0c16;
            --card-bg: #121424;
            --accent-purple: #8b5cf6;
            --text-muted: #737898;
            --border-color: #22253f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: 1;
        }
        body::before { top: -10%; left: -10%; width: 300px; height: 300px; background-color: var(--accent-purple); animation: floatGlow 8s infinite alternate; }
        body::after { bottom: -10%; right: -10%; width: 350px; height: 350px; background-color: #ec4899; animation: floatGlow 12s infinite alternate-reverse; }

        @keyframes floatGlow {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 32px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 1.5rem; margin-bottom: 8px; font-weight: 700; }
        p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 24px; }

        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        input {
            width: 100%; background-color: #1a1d36; border: 1px solid var(--border-color);
            padding: 12px; border-radius: 8px; color: #fff; font-size: 0.9rem; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent-purple); box-shadow: 0 0 8px rgba(139,92,246,0.3); }

        .error-msg { background: rgba(239,68,68,0.1); color: #ef4444; font-size: 0.8rem; padding: 10px; border-radius: 6px; margin-bottom: 16px; text-align: left; border: 1px solid #ef444433; }
        .login-btn {
            background-color: var(--accent-purple); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s;
        }
        .login-btn:hover { background-color: #7c3aed; transform: translateY(-1px); }
        .hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 16px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Welcome Back ⚡</h2>
    <p>Enter your keys to resume your academic arc</p>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter 'Your-name'" required autocomplete="off">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter 'password123'" required>
        </div>
        <button type="submit" class="login-btn">Initialize Session</button>
    </form>

    <div class="hint">Dev Credentials: <span style="color:#fff;">Your-name</span> / <span style="color:#fff;">password123</span></div>
</div>

</body>
</html>
